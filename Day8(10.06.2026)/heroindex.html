<!DOCTYPE html>
<html>
<head>
    <title>Heroes</title>
</head>
<body>
<h1>Heroes List</h1>
<form id="heroForm">
    Name:<input id="name">
    Power:<input id="power">
    <button type="submit">Add</button>
</form>
<h2>Heroes</h2>
<ul id="heroList"></ul>
<script>
        const form = document.getElementById("heroForm")
        const list = document.getElementById("heroList")
        fetch("/heroes")
            .then(res=>res.json()) //Response(res),still raw ----------------- res.json()-parses raw JSON string to js object
            .then(data=>data.forEach(h=>addHero(h))); //can finally used the parsed data
        form.addEventListener("submit",e=>{ e.preventDefault();
        const hero={
            name:document.getElementById("name").value,
            power:document.getElementById("power").value
        };
        fetch("/heroes",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(hero)
        })
            .then(res=>res.json())
            .then(h=>addHero(h));
        form.reset();
        });
        function addHero(hero) {
            const li=document.createElement("li");
            li.textContent=hero.name+" -"+ hero.power;
            list.appendChild(li);
        }
</script>

</body>
</html>
