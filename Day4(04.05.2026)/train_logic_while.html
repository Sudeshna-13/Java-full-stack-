<html>
<body>
<h1>LOOK UR SEATS HERE</H1>
<input type="number" id="n1" placeholder="seat number">
<button onclick="seat()">submit</button>
<h3 id="number"></h3>
<script>
function seat(){
let a = document.getElementById("n1").value;
if(a<1 || a>80) document.getElementById("number").textContent="Invalid seat number ";
else{
while(a>8){
a=a-8;
}
if(a===1 || a===4) document.getElementById("number").textContent="Lower seat ";
else if(a===2 || a===5) document.getElementById("number").textContent="Middle seat ";
else if(a===3 || a===6) document.getElementById("number").textContent="Upper seat ";
else if(a===7 ) document.getElementById("number").textContent="Side Lower seat ";
else  document.getElementById("number").textContent="Side Upper seat";
}
}
</script>

</body>
</html>
